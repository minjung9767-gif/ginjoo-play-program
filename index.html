<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#a9e3f7" />
  <title>긴주 놀이터 💧</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 시작 화면: 놀이 선택 -->
  <section id="home" class="screen active">
    <!-- 떠다니는 물방울 (장식) -->
    <div class="home-bubbles" aria-hidden="true">
      <span class="float-bubble b1"></span>
      <span class="float-bubble b2"></span>
      <span class="float-bubble b3"></span>
      <span class="float-bubble b4"></span>
      <span class="float-bubble b5"></span>
      <span class="float-bubble b6"></span>
      <span class="float-bubble b7"></span>
      <span class="float-bubble b8"></span>
    </div>

    <div class="home-header">
      <h1 class="home-title"><span class="title-text">긴주 놀이터</span> <span class="title-emoji">🛝</span></h1>
    </div>
    <div class="play-buttons">
      <button class="play-btn" data-game="mirror">
        <span class="play-emoji">
          <svg viewBox="0 0 100 100" class="icon-svg" aria-hidden="true">
            <circle cx="50" cy="50" r="46" fill="#2ecc71"/>
            <path fill="#fff" d="M37 27c-3 0-6 3-5 6 1 9 5 17 11 23s14 10 23 11c3 1 6-2 6-5v-8c0-2-2-4-4-5l-8-2c-2 0-3 0-4 1l-4 4c-5-3-9-7-12-12l4-4c1-1 1-3 1-4l-2-8c-1-2-3-4-5-4z"/>
          </svg>
        </span>
        <span class="play-label">영상통화</span>
      </button>
      <button class="play-btn" data-game="motion">
        <span class="play-emoji">🫧</span>
        <span class="play-label">비눗방울 놀이</span>
      </button>
      <button class="play-btn" data-game="keypad">
        <span class="play-emoji">
          <svg viewBox="0 0 100 100" class="icon-svg" aria-hidden="true">
            <rect x="26" y="6" width="48" height="80" rx="16" fill="#4a7fc0"/>
            <rect x="31" y="11" width="38" height="70" rx="12" fill="#5b91d4"/>
            <circle cx="50" cy="19" r="4" fill="#7ef0a6"/>
            <g fill="#fff">
              <rect x="40" y="30" width="9" height="9" rx="2.5"/>
              <rect x="55" y="30" width="9" height="9" rx="2.5"/>
              <rect x="40" y="43" width="9" height="9" rx="2.5"/>
              <rect x="55" y="43" width="9" height="9" rx="2.5"/>
              <rect x="40" y="56" width="9" height="9" rx="2.5"/>
              <rect x="55" y="56" width="9" height="9" rx="2.5"/>
            </g>
            <circle cx="49" cy="72" r="9" fill="#e8eef5"/>
            <rect x="49" y="67.5" width="36" height="9" rx="4.5" fill="#e8eef5"/>
          </svg>
        </span>
        <span class="play-label">딩동 현관문</span>
      </button>
    </div>
  </section>

  <!-- 게임 화면: 매직 거울 -->
  <section id="game" class="screen">
    <video id="camera" playsinline autoplay muted></video>
    <canvas id="overlay"></canvas>

    <!-- 부모용 컨트롤 (모서리, 작게) -->
    <div class="controls">
      <button id="muteBtn" class="ctrl-btn" title="소리 켜기/끄기" aria-label="소리">
        <svg class="ic ic-sound" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#fff" d="M4 9v6h4l5 5V4L8 9H4z"/>
          <path fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" d="M16 8.5a5 5 0 0 1 0 7M18.8 6a8.5 8.5 0 0 1 0 12"/>
        </svg>
        <svg class="ic ic-muted" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#fff" d="M4 9v6h4l5 5V4L8 9H4z"/>
          <path fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" d="M16 9.5l5 5M21 9.5l-5 5"/>
        </svg>
      </button>
      <button id="homeBtn" class="ctrl-btn" title="홈으로" aria-label="홈">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#fff" d="M12 3.2l9 7.8h-2.2V20h-4.6v-5.4h-4.4V20H5V11H2.8L12 3.2z"/>
        </svg>
      </button>
    </div>

    <!-- 로딩 / 안내 오버레이 -->
    <div id="status" class="status-overlay">
      <div class="status-box">
        <div class="status-emoji">📷</div>
        <p id="statusText">카메라를 준비하고 있어요...</p>
      </div>
    </div>
  </section>

  <script type="module" src="js/main.js"></script>
</body>
</html>
