<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#a9e3f7" />
  <title>긴주 놀이터 🎈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dongle:wght@700&family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 시작 화면: 놀이 선택 -->
  <section id="home" class="screen active">
    <!-- 떠다니는 물방울 (장식) -->
    <div class="home-bubbles" aria-hidden="true">
      <span class="float-bubble b1"></span>
      <span class="float-bubble b2"></span>
      <span class="float-bubble b3"></span>
      <span class="float-bubble b4"></span>
      <span class="float-bubble b5"></span>
      <span class="float-bubble b6"></span>
      <span class="float-bubble b7"></span>
      <span class="float-bubble b8"></span>
    </div>

    <div class="home-header">
      <h1 class="home-title">
        <span class="title-text">긴주 놀이터</span>
        <span class="title-emoji">
          <svg viewBox="0 0 112 100" class="playground-svg" aria-hidden="true">
            <!-- 깃발 -->
            <line x1="45" y1="5" x2="45" y2="20" stroke="#a9743f" stroke-width="3" stroke-linecap="round"/>
            <path d="M45 6 L60 10.5 L45 15 Z" fill="#ff6b8a"/>
            <!-- 지붕 -->
            <path d="M27 37 L45 18 L63 37 Z" fill="#5aaee0"/>
            <!-- 플랫폼 -->
            <rect x="30" y="36" width="30" height="7" rx="3.5" fill="#f4c97a"/>
            <!-- 기둥 -->
            <rect x="32" y="43" width="5" height="42" rx="2.5" fill="#e3a85a"/>
            <rect x="53" y="43" width="5" height="42" rx="2.5" fill="#e3a85a"/>
            <!-- 기둥 발 -->
            <rect x="31" y="83" width="7" height="6" rx="2" fill="#5aaee0"/>
            <rect x="52" y="83" width="7" height="6" rx="2" fill="#5aaee0"/>
            <!-- 사다리 단 -->
            <g stroke="#c98a4b" stroke-width="3" stroke-linecap="round">
              <line x1="36" y1="52" x2="54" y2="52"/>
              <line x1="36" y1="61" x2="54" y2="61"/>
              <line x1="36" y1="70" x2="54" y2="70"/>
              <line x1="36" y1="79" x2="54" y2="79"/>
            </g>
            <!-- 미끄럼틀 -->
            <path d="M58 49 q24 3 31 30 q1.5 7 9 9" fill="none" stroke="#ffb84d" stroke-width="10" stroke-linecap="round"/>
            <path d="M58 49 q24 3 31 30 q1.5 7 9 9" fill="none" stroke="#ffe0a8" stroke-width="3.5" stroke-linecap="round"/>
          </svg>
        </span>
      </h1>
    </div>
    <div class="play-buttons">
      <button class="play-btn" data-game="mirror">
        <span class="play-emoji">
          <svg viewBox="0 0 100 100" class="icon-svg" aria-hidden="true">
            <circle cx="50" cy="50" r="46" fill="#2ecc71"/>
            <g transform="translate(24,24) scale(2.17)" fill="#fff">
              <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
            </g>
          </svg>
        </span>
        <span class="play-label">영상통화</span>
      </button>
      <button class="play-btn" data-game="motion">
        <span class="play-emoji">🫧</span>
        <span class="play-label">비눗방울 놀이</span>
      </button>
      <button class="play-btn" data-game="keypad">
        <span class="play-emoji">
          <svg viewBox="0 0 100 100" class="icon-svg" aria-hidden="true">
            <rect x="26" y="6" width="48" height="80" rx="16" fill="#4a7fc0"/>
            <rect x="31" y="11" width="38" height="70" rx="12" fill="#5b91d4"/>
            <circle cx="50" cy="19" r="4" fill="#7ef0a6"/>
            <g fill="#fff">
              <rect x="40" y="30" width="9" height="9" rx="2.5"/>
              <rect x="55" y="30" width="9" height="9" rx="2.5"/>
              <rect x="40" y="43" width="9" height="9" rx="2.5"/>
              <rect x="55" y="43" width="9" height="9" rx="2.5"/>
              <rect x="40" y="56" width="9" height="9" rx="2.5"/>
              <rect x="55" y="56" width="9" height="9" rx="2.5"/>
            </g>
            <circle cx="49" cy="72" r="9" fill="#e8eef5"/>
            <rect x="49" y="67.5" width="36" height="9" rx="4.5" fill="#e8eef5"/>
          </svg>
        </span>
        <span class="play-label">딩동 현관문</span>
      </button>
      <button class="play-btn play-btn-night" data-game="story">
        <span class="play-emoji">🌙</span>
        <span class="play-label">잠자리 동화</span>
      </button>
    </div>
  </section>

  <!-- 게임 화면: 매직 거울 -->
  <section id="game" class="screen">
    <video id="camera" playsinline autoplay muted></video>
    <canvas id="overlay"></canvas>

    <!-- 부모용 컨트롤 (모서리, 작게) -->
    <div class="controls">
      <button id="muteBtn" class="ctrl-btn" title="소리 켜기/끄기" aria-label="소리">
        <svg class="ic ic-sound" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#fff" d="M4 9v6h4l5 5V4L8 9H4z"/>
          <path fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" d="M16 8.5a5 5 0 0 1 0 7M18.8 6a8.5 8.5 0 0 1 0 12"/>
        </svg>
        <svg class="ic ic-muted" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#fff" d="M4 9v6h4l5 5V4L8 9H4z"/>
          <path fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" d="M16 9.5l5 5M21 9.5l-5 5"/>
        </svg>
      </button>
      <button id="homeBtn" class="ctrl-btn" title="홈으로" aria-label="홈">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#fff" d="M12 3.2l9 7.8h-2.2V20h-4.6v-5.4h-4.4V20H5V11H2.8L12 3.2z"/>
        </svg>
      </button>
    </div>

    <!-- 로딩 / 안내 오버레이 -->
    <div id="status" class="status-overlay">
      <div class="status-box">
        <div class="status-emoji">📷</div>
        <p id="statusText">카메라를 준비하고 있어요...</p>
      </div>
    </div>
  </section>

  <script type="module" src="js/main.js"></script>
</body>
</html>
