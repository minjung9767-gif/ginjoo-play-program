<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffd6e8" />
  <title>긴주 놀이터 🎈</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 시작 화면: 놀이 선택 -->
  <section id="home" class="screen active">
    <!-- 떠다니는 물방울 (장식) -->
    <div class="home-bubbles" aria-hidden="true">
      <span class="float-bubble b1"></span>
      <span class="float-bubble b2"></span>
      <span class="float-bubble b3"></span>
      <span class="float-bubble b4"></span>
      <span class="float-bubble b5"></span>
      <span class="float-bubble b6"></span>
      <span class="float-bubble b7"></span>
      <span class="float-bubble b8"></span>
    </div>

    <h1 class="home-title">긴주 놀이터 💧</h1>
    <p class="home-sub">하고 싶은 놀이를 골라요</p>
    <div class="play-buttons">
      <button class="play-btn" data-game="mirror">
        <span class="play-emoji">🪞</span>
        <span class="play-label">매직 거울</span>
      </button>
      <button class="play-btn" data-game="motion">
        <span class="play-emoji">💧</span>
        <span class="play-label">물방울 놀이</span>
      </button>
      <button class="play-btn" data-game="peekaboo">
        <span class="play-emoji">🐻</span>
        <span class="play-label">까꿍 동물</span>
      </button>
    </div>
  </section>

  <!-- 게임 화면: 매직 거울 -->
  <section id="game" class="screen">
    <video id="camera" playsinline autoplay muted></video>
    <canvas id="overlay"></canvas>

    <!-- 부모용 컨트롤 (모서리, 작게) -->
    <div class="controls">
      <button id="muteBtn" class="ctrl-btn" title="소리 켜기/끄기">🔊</button>
      <button id="homeBtn" class="ctrl-btn" title="홈으로">🏠</button>
    </div>

    <!-- 로딩 / 안내 오버레이 -->
    <div id="status" class="status-overlay">
      <div class="status-box">
        <div class="status-emoji">📷</div>
        <p id="statusText">카메라를 준비하고 있어요...</p>
      </div>
    </div>
  </section>

  <script type="module" src="js/main.js"></script>
</body>
</html>
