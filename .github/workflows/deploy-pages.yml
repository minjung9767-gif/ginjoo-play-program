name: Deploy to GitHub Pages

# 이 브랜치에 푸시될 때마다 정적 사이트를 GitHub Pages로 배포합니다.
# (설정을 직접 만질 필요 없이 자동으로 Pages가 켜지고 링크가 생깁니다.)
on:
  push:
    branches: ["claude/ecstatic-cori-ux0iuu"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
